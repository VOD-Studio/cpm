# HTTP 重定向到 HTTPS
server {
    listen 80;
    server_name xunrua.top www.xunrua.top;

    # 腾讯云负载均衡健康检查
    location /nginx-health {
        access_log off;
        return 200 "healthy\n";
    }

    # 重定向到 HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS 主配置
server {
    listen 443 ssl http2;
    server_name xunrua.top www.xunrua.top;

    # SSL 证书配置（腾讯云 SSL 证书）
    ssl_certificate /etc/nginx/ssl/xunrua.top_bundle.crt;
    ssl_certificate_key /etc/nginx/ssl/xunrua.top.key;

    # SSL 安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:HIGH:!aNULL:!MD5:!RC4:!DHE;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # 腾讯云特定优化
    client_max_body_size 100M;
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # 主站目录
    root /var/www/html;
    index index.html index.php;

    # Coding Plan Manager 应用
    location /cpm {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API 请求代理到后端容器
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 简历项目位于 /resume/ 路径
    location ^~ /resume {
        alias /var/www/resume;
        try_files $uri $uri/ @fallback_resume;
    }

    # 静态资源缓存
    location ~* ^/static/(.*\.(js|css|png|jpg|jpeg|gif|ico|svg|webp|mp4|avi|mov|mp3))$ {
        alias /var/www/static/$1;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary Accept-Encoding;
        valid_referers none blocked server_names;
        if ($invalid_referer) {
            return 403;
        }
    }

    # 字体文件
    location ~* \.(woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Access-Control-Allow-Origin *;
    }

    # 安全头配置
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;
}

# 腾讯云负载均衡健康检查（备用）
server {
    listen 8080;
    server_name _;
    location /health {
        access_log off;
        return 200 "healthy\n";
    }
}
